name: Deploy machwave-web

on:
  release:
    types: [published]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Build static export
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: npm run build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Upload to GCS
        run: gsutil -m rsync -r -d out/ gs://${{ secrets.GCS_WEB_BUCKET_NAME }}/

      - name: Set cache headers
        run: |
          gsutil -m setmeta \
            -h "Cache-Control:no-cache, no-store, must-revalidate" \
            "gs://${{ secrets.GCS_WEB_BUCKET_NAME }}/**/*.html" || true
          gsutil -m setmeta \
            -h "Cache-Control:public, max-age=31536000, immutable" \
            "gs://${{ secrets.GCS_WEB_BUCKET_NAME }}/_next/static/**" || true

      - name: Make bucket public (idempotent)
        run: |
          gsutil iam ch allUsers:objectViewer gs://${{ secrets.GCS_WEB_BUCKET_NAME }} || true
